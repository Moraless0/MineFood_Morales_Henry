<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventario - MineFood</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar__logo">🌱 MineFood</div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__item">📊 Dashboard</a>
        <a href="inventory.html" class="sidebar__item active">📦 Inventario</a>
        <a href="dishes.html" class="sidebar__item">🍽️ Platillos</a>
        <a href="orders.html" class="sidebar__item">🧾 Pedidos</a>
        <a href="reports.html" class="sidebar__item">📈 Reportes</a>
      </nav>
      <div class="sidebar__footer">
        <a href="index.html" class="sidebar__item sidebar__item--logout">🚪 Salir</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="topbar__title">📦 Inventario</h1>
        <div class="topbar__actions">
          <input type="text" placeholder="Buscar insumo..." class="search-input">
          <button class="mc-button">+ Agregar</button>
        </div>
      </header>

      <div class="content">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Cantidad</th>
                <th>Unidad</th>
                <th>Estado</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>ZAN-001</td>
                <td>Zanahoria</td>
                <td>Zanahoria fresca orgánica</td>
                <td>18</td>
                <td>kg</td>
                <td><span class="badge badge--ok">OK</span></td>
                <td>
                  <button class="btn-small">Editar</button>
                  <button class="btn-small btn-danger">Eliminar</button>
                </td>
              </tr>
              <tr>
                <td>TRI-002</td>
                <td>Trigo</td>
                <td>Trigo integral</td>
                <td>12</td>
                <td>kg</td>
                <td><span class="badge badge--ok">OK</span></td>
                <td>
                  <button class="btn-small">Editar</button>
                  <button class="btn-small btn-danger">Eliminar</button>
                </td>
              </tr>
              <tr>
                <td>REM-003</td>
                <td>Remolacha</td>
                <td>Remolacha roja</td>
                <td>6</td>
                <td>kg</td>
                <td><span class="badge badge--warning">Bajo</span></td>
                <td>
                  <button class="btn-small">Editar</button>
                  <button class="btn-small btn-danger">Eliminar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
