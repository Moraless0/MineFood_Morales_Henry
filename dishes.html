<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platillos - MineFood</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar__logo">🌱 MineFood</div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__item">📊 Dashboard</a>
        <a href="inventory.html" class="sidebar__item">📦 Inventario</a>
        <a href="dishes.html" class="sidebar__item active">🍽️ Platillos</a>
        <a href="orders.html" class="sidebar__item">🧾 Pedidos</a>
        <a href="reports.html" class="sidebar__item">📈 Reportes</a>
      </nav>
      <div class="sidebar__footer">
        <a href="index.html" class="sidebar__item sidebar__item--logout">🚪 Salir</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="topbar__title">🍽️ Platillos</h1>
        <div class="topbar__actions">
          <button class="mc-button">+ Agregar Platillo</button>
        </div>
      </header>

      <div class="content">
        <div class="dishes-grid">
          <div class="dish-card">
            <div class="dish-card__icon">🥕</div>
            <div class="dish-card__name">Ensalada de Zanahoria</div>
            <div class="dish-card__price">$12.50</div>
            <div class="dish-card__actions">
              <button class="btn-small">Editar</button>
              <button class="btn-small btn-danger">Eliminar</button>
            </div>
          </div>
          <div class="dish-card">
            <div class="dish-card__icon">🍄</div>
            <div class="dish-card__name">Estofado de Champiñones</div>
            <div class="dish-card__price">$15.00</div>
            <div class="dish-card__actions">
              <button class="btn-small">Editar</button>
              <button class="btn-small btn-danger">Eliminar</button>
            </div>
          </div>
          <div class="dish-card">
            <div class="dish-card__icon">🍞</div>
            <div class="dish-card__name">Pan Integral</div>
            <div class="dish-card__price">$8.00</div>
            <div class="dish-card__actions">
              <button class="btn-small">Editar</button>
              <button class="btn-small btn-danger">Eliminar</button>
            </div>
          </div>
          <div class="dish-card">
            <div class="dish-card__icon">🍰</div>
            <div class="dish-card__name">Pastel de Zanahoria</div>
            <div class="dish-card__price">$18.00</div>
            <div class="dish-card__actions">
              <button class="btn-small">Editar</button>
              <button class="btn-small btn-danger">Eliminar</button>
            </div>
          </div>
          <div class="dish-card">
            <div class="dish-card__icon">🍲</div>
            <div class="dish-card__name">Sopa de Remolacha</div>
            <div class="dish-card__price">$13.50</div>
            <div class="dish-card__actions">
              <button class="btn-small">Editar</button>
              <button class="btn-small btn-danger">Eliminar</button>
            </div>
          </div>
          <div class="dish-card">
            <div class="dish-card__icon">🍹</div>
            <div class="dish-card__name">Jugo de Melón</div>
            <div class="dish-card__price">$6.00</div>
            <div class="dish-card__actions">
              <button class="btn-small">Editar</button>
              <button class="btn-small btn-danger">Eliminar</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
