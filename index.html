<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MineFood</title>
  <link rel="icon" type="image/x-icon" href="assets/icons/minecraft_title.ico">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/login.css">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="bg-fallback" id="bg-fallback"></div>

  <!-- Pantalla de carga estilo Minecraft -->
  <div class="loading-screen" id="loading-screen">
    <div class="loading-screen__content">
      <img src="assets/images/minefood.png" alt="MineFood" class="loading-screen__logo">
      <div class="loading-screen__progress">
        <div class="loading-screen__bar"></div>
      </div>
      <p class="loading-screen__text">Cargando...</p>
    </div>
  </div>

  <div class="minecraft-menu">
    <div class="minecraft-menu__logo">
      <img src="assets/images/minefood_title.png" alt="MineFood" class="minecraft-menu__logo-img">
    </div>
    
    <div class="minecraft-menu__buttons">
      <button class="minecraft-button" id="btn-login">
        <img src="assets/1.21.11/gui/sprites/icon/checkmark.png" alt="" class="minecraft-button__icon">
        Iniciar Sesión
      </button>
    </div>

    <!-- Login Modal -->
    <div class="login-modal" id="login-modal">
      <div class="login-modal__content">
        <button class="login-modal__close" id="close-modal">×</button>
        <img src="assets/1.21.11/gui/sprites/icon/info.png" alt="" class="login-modal__icon">
        <h2 class="login-modal__title">Iniciar Sesión</h2>
        <form class="login-form">
          <div class="mc-form-group">
            <img src="assets/1.21.11/gui/sprites/container/slot.png" alt="" class="mc-form-icon">
            <div>
              <label class="mc-label" for="usuario">Usuario</label>
              <input id="usuario" class="mc-input" type="text" placeholder="chef" required>
            </div>
          </div>

          <div class="mc-form-group">
            <img src="assets/1.21.11/gui/sprites/container/slot.png" alt="" class="mc-form-icon">
            <div>
              <label class="mc-label" for="contrasena">Contraseña</label>
              <input id="contrasena" class="mc-input" type="password" placeholder="123456" required>
            </div>
          </div>

          <button type="submit" class="mc-button">
            <img src="assets/1.21.11/gui/sprites/icon/checkmark.png" alt="" class="mc-button-icon">
            Entrar
          </button>
        </form>
      </div>
    </div>

    <p class="minecraft-menu__footer">MineFood - Henry Morales</p>
    <a href="https://github.com/Moraless0" target="_blank" class="minecraft-menu__github">
      <img src="assets/1.21.11/gui/sprites/icon/link.png" alt="" class="minecraft-menu__github-icon">
      GitHub
    </a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="js/background.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Pantalla de carga - solo mostrar la primera vez
    const loadingScreen = document.getElementById('loading-screen');
    const FIRST_VISIT_KEY = 'minefood_first_visit';

    if (!localStorage.getItem(FIRST_VISIT_KEY)) {
      localStorage.setItem(FIRST_VISIT_KEY, 'true');
      // La pantalla de carga se muestra automáticamente y desaparece con la animación CSS
    } else {
      // Ocultar pantalla de carga si ya visitó antes
      if (loadingScreen) {
        loadingScreen.style.display = 'none';
      }
    }

    // Manejar modal de login
    const loginModal = document.getElementById('login-modal');
    const btnLogin = document.getElementById('btn-login');
    const closeModal = document.getElementById('close-modal');

    btnLogin.addEventListener('click', () => {
      loginModal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
      loginModal.style.display = 'none';
    });

    loginModal.addEventListener('click', (e) => {
      if (e.target === loginModal) {
        loginModal.style.display = 'none';
      }
    });

    // Manejar formulario de login
    const loginForm = document.querySelector('.login-form');
    if (loginForm) {
      loginForm.addEventListener('submit', (event) => {
        event.preventDefault();
        
        const username = document.getElementById('usuario').value;
        const password = document.getElementById('contrasena').value;
        
        if (Auth.validateCredentials(username, password)) {
          window.location.href = 'dashboard.html';
        } else {
          alert('Usuario o contraseña incorrectos. Intenta con: chef / 123456');
        }
      });
    }
  </script>
</body>
</html>
