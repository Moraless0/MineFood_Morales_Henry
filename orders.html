<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos - MineFood</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar__logo">🌱 MineFood</div>
      <nav class="sidebar__nav">
        <a href="dashboard.html" class="sidebar__item">📊 Dashboard</a>
        <a href="inventory.html" class="sidebar__item">📦 Inventario</a>
        <a href="dishes.html" class="sidebar__item">🍽️ Platillos</a>
        <a href="orders.html" class="sidebar__item active">🧾 Pedidos</a>
        <a href="reports.html" class="sidebar__item">📈 Reportes</a>
      </nav>
      <div class="sidebar__footer">
        <a href="index.html" class="sidebar__item sidebar__item--logout">🚪 Salir</a>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h1 class="topbar__title">🧾 Pedidos</h1>
        <div class="topbar__actions">
          <select class="filter-select">
            <option>Todos</option>
            <option>Pendientes</option>
            <option>En preparación</option>
            <option>Completados</option>
          </select>
          <button class="mc-button">+ Crear Pedido</button>
        </div>
      </header>

      <div class="content">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th>Pedido</th>
                <th>Mesa</th>
                <th>Estado</th>
                <th>Items</th>
                <th>Total</th>
                <th>Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>PED-001</td>
                <td>3</td>
                <td><span class="badge badge--preparing">Preparando</span></td>
                <td>Estofado x2</td>
                <td>$35.50</td>
                <td>
                  <button class="btn-small">Editar</button>
                  <button class="btn-small btn-danger">Eliminar</button>
                </td>
              </tr>
              <tr>
                <td>PED-002</td>
                <td>7</td>
                <td><span class="badge badge--pending">Pendiente</span></td>
                <td>Ensalada x1</td>
                <td>$20.50</td>
                <td>
                  <button class="btn-small">Editar</button>
                  <button class="btn-small btn-danger">Eliminar</button>
                </td>
              </tr>
              <tr>
                <td>PED-003</td>
                <td>1</td>
                <td><span class="badge badge--completed">Completado</span></td>
                <td>Pastel x1, Jugo x2</td>
                <td>$30.00</td>
                <td>
                  <button class="btn-small">Ver</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
